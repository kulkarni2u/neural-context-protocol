services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: ncp-postgres
    environment:
      POSTGRES_DB: ncp
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - ncp-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ncp"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: ncp-redis
    ports:
      - "6379:6379"
    volumes:
      - ncp-redis-data:/data
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  ncp-postgres-data:
  ncp-redis-data:
