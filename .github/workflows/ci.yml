name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  minimum-python-import:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up minimum Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install package
        run: python -m pip install .

      - name: Import package
        run: python -c "import ncp; print(ncp.__version__)"

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install package, provider, and dev dependencies
        run: python -m pip install -e '.[dev,providers]'

      - name: Lint
        run: python -m ruff check .

      - name: Run tests
        run: python -m pytest -p no:cacheprovider tests

      - name: Benchmark gates
        run: |
          python benchmarks/coding_pipeline/run.py --turns 40 | python -c "import json,sys; artifact=json.load(sys.stdin); summary=artifact['summary']; assert summary['pass'], summary; print('coding gate OK', summary['reduction_factor'])"
          python benchmarks/needle/run.py --turns 24 --needles 6 --budget 4 | python -c "import json,sys; artifact=json.load(sys.stdin); assert artifact['summary']['ncp_beats_sliding_window'], artifact['summary']; print('needle gate OK')"

      - name: Build artifacts
        run: python -m build
